<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A logic puzzle game invented by artificial intelligence"
    />
    <title>Sumtotal</title>
    <link
      rel="stylesheet"
      type="text/css"
      media="screen, projection"
      href="lib/css/styles.css"
    />

    <!-- VT323 for the "made with love" credit; online-only, monospace fallback offline. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <h1>Sumtotal</h1>
    <h2>
      Delete numbers so each row/column adds up to the target number at the
      right/bottom.
    </h2>

    <div id="loadgame">
      <div class="grid" id="grid"></div>
      <div class="controls">
        <button id="mistakes" class="btn btn-default">Errors</button>
        <button id="hint" class="btn btn-default">Hint</button>
        <button id="restart" class="btn btn-default">Restart</button>
        <button id="reveal" class="btn btn-default">Reveal</button>
        <button id="remove" class="hidden btn btn-default">
          Remove Mistakes
        </button>
      </div>
      <h2 class="complete hidden">Puzzle solved! Well done</h2>
      <h2 class="revealed hidden">Better luck next time!</h2>
      <div class="new hidden btn btn-default">
        <select id="size">
          <option value="3">3x3 (beginner)</option>
          <option value="4">4x4 (easy)</option>
          <option value="5">5x5 (intermediate)</option>
          <option value="6">6x6 (challenging)</option>
          <option value="7">7x7 (advanced)</option>
          <option value="8">8x8 (expert)</option>
          <option value="9">9x9 (master)</option>
        </select>
        <button id="new" class="btn btn-primary">New Puzzle</button>
      </div>
    </div>

    <footer class="page-credit">
      <a
        class="settings-link"
        href="https://github.com/evilchinesefood/Sumtotal"
        target="_blank"
        rel="noopener noreferrer"
        >View source on GitHub</a
      >
      <div class="BezelWrap">
        <a
          class="credit sm"
          href="https://jdayers.com/"
          target="_blank"
          rel="noopener noreferrer"
          >&gt; made with <span class="heart">❤</span> by david ayers<span
            class="cursor"
            >_</span
          ></a
        >
      </div>
    </footer>

    <script type="text/javascript" src="lib/js/functions.js"></script>
  </body>
</html>
